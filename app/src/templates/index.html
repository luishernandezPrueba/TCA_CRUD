<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=7">
</head>
<body>

<div class="main-panel">
    <h1>Tu Comunidad Academica (TCA)</h1>

    <div class="area">
        <div class="area-header">
            <div class="header-left">
                <h2>Lista de Estudiantes</h2>
                <button type="button" class="toggle-form-btn" onclick="toggleForm('studentForm')">+ Nuevo</button>
            </div>
            <form id="searchForm" class="search-inline">
                <input type="text" id="searchLastName" placeholder="Buscar por apellido">
                <button type="submit">Buscar</button>
                <button type="button" onclick="loadStudents()">Todos</button>
            </form>
        </div>

        <form id="studentForm" class="add-form" style="display:none; margin-bottom: 15px;">
            <input type="text" id="first_name" placeholder="Nombre">
            <input type="text" id="middle_name" placeholder="Segundo Nombre">
            <input type="text" id="last_name" placeholder="Apellido" required>
            <select id="gender">
                <option value="M">M</option>
                <option value="F">F</option>
                <option value="O">O</option>
            </select>
            <button type="submit">Crear</button>
        </form>

        <table id="studentsTable" class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Género</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script src="/static/js/app.js?v=6"></script>

</body>
</html>
